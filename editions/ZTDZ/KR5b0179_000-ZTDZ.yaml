front:
  text: 金籙祈夀午朝儀
  hash: sha256:8bac42c907c4749d9374a48b81fe3b142bd3d7be0298b9399dd8dfd6a4201dc9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0179_SJB_000-090094c, image: sjb/09/090094c.png}
body:
  text: 法事如式各禮師存念如法請宣神呪丹華流映寳芝生光神精徹幽散靈八方直符攝炁嘯命朱童三精敷煥注我絳宫赤神安鎭五香溢充洞映形外表裏發光身生水火獨歩飛行和與道合眞鳴法鼓二十四通無上三天玄元始三炁太上老君召出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直曰香官各三十六人出出者嚴裝顯服冠帶垂纓關啓玄壇土地方域神眞臣今午朝陞壇行道朝謁帝眞欽奉其諸丹悃具載緘謄願得太上至眞道炁靈寳瑞光下降流入臣等身中令臣所啓之誠速逹徑御至眞無極大道三清上聖昊天至尊金闕玉皇上帝御前請稱法位具位臣姓某與臨壇官衆等謹同誠上啓虚無自然至眞無極大道玉清聖境大羅元始天尊太上道君太上老君昊天至尊玉皇上帝紫微上宫天皇大帝紫微中宫北極大帝后土皇地祇玄都萬夀天尊太平護國天尊福生無量天尊玄都玉京七寳層臺紫微上宮靈寳至眞諸君丈人金闕諸天彌羅衆聖上相上宰上保上傳少保少傅四師五帝十二仙卿三十六部尊經玄中大法師三天大法師日月星宮斗府周天宿度河漢星眞南極老人福祿壽星眞君皇帝本命星君帝座照臨星宰三界内外應感一切眞靈臣聞道啓洪濛峙三才而並立神居浩渺由五太以潜分上參乾象之高明下列坤輿之溥博大梵垂光芒之雲篆至眞示空洞之靈章懸寳黍於空玄振瓊音於寥廓科傳億劫教啓先天臣等忝與冠裳叨承教法學識深慚於淺陋包含實頼於寛洪適逢聖夀之屇期大闡玄科而致禱皈依九陛恪盡一誠凡有請祈敢忘關奏欽承上命爰謹祝釐華月映瑶光吉慶鍾於顓帝郷雲屬乾象嘉祥見於唐時南辰司祿筭以延洪北極注年齡而永久天皇萬八千歲本清靜以長生廣成千二百年抱沖和而不老時逢聖誕醮闡眞科以今停午陞壇行道請法衆等運茲初捻上香願此香煙騰空徑上供養至眞無上道寳大羅元始天尊金闕至尊玉皇上帝無上大羅至眞衆聖臣等皈身皈神皈命首體投地仰依太上三尊十方衆聖願以是香功德上祝皇帝陛下伏願道合三皇名高五帝曰觀聳鉞宗之頂夀祉巍峩天潢接崐崘之源福基浩渺治定㑹同於五服勲成響應於八方來玉帛以居尊合車書而拱極今故燒香自皈依師尊大聖衆至眞之德得道之後保天長存和與道合眞晝刻傳呼天顔有喜瞻虹流之在渚列鷺序以趨朝以今停午陞壇行道請法衆等運兹二捻上香願此香煙騰空徑上供養至眞無上經寳玉宸靈寳天尊紫微天皇大帝禹餘天宮眞仙聖衆臣等皈身皈神皈命首體投地仰依太上三尊十方衆聖願以是香功德上祝皇帝陛下伏願慶衍九疇尊居一統執玉帛者來萬國春滿乾坤垂衣裳而撫八紘風清閶闔夀筭等華嵩而永固福源同溟渤以弘深神相蕃釐天錫純嘏今故燒香自皈依師尊大聖衆至眞之徳得道之後保天長存和與道合眞大明方中品彚咸蒙於普照眞科再瀆忱誠有冀於感通以今停午陞壇行道請法衆等運兹三捻上香願此香煙騰空徑上供養至眞無上師寳五靈玄老天尊紫微北極大帝后土皇地祇大赤天宮無邊聖衆臣等皈身皈神皈命首體投地仰依太上三尊十方衆聖願以是香功徳上祝皇帝陛下伏願寳曆光華金枝敷茂皇圖世永廣開泰運於八埏聖夀天齊普洽歡聲於四海喜祥畢集景福咸臻今故燒香自皈依師尊大聖衆至眞之德得道之後保天長存和與道合眞禮方懴悔命魔三啓三禮重稱法位具位臣姓某謹重誠上啓三境至尊十華上聖玉京金闕天帝天眞日月星斗羣眞十方師尊聖衆三界官屬醮筵設像一切威靈臣聞統馭兩間壽筭齊天而不老治隆九有光明如日之方中慶集百祥茂五福垂衣裳而致治修禮樂以化民尊居南面以趨朝環拱北辰而有象克綏四海慶衍萬邦妙參賛於神明永奠安於宗社天開夀域日啓玄科潔淨壇場森嚴儀衞歸心十極瞻仙仗以齊臨資福九疇祝皇圖而永固伏冀丙觀醮禮申飭司存書椿筭於青編鑒宸衷於丹剡五行應軌七曜順躔六氣和平甘露零瀼於天瑞衆眞歡慶醴泉融溢於地靈年穀豐登乾坤交泰恩沾率土德被普天則上明天尊大慈之化下副臣等皈命之誠謹啓以聞十二願存神燒香香官使者左右龍虎君侍香諸靈官當令臣向來午朝陞壇行道之所自然生金液丹碧之英百靈衆眞交會在此香火鑪前當願精誠孚感聖夀綿長十方仙童玉女接侍蘭煙傳臣向來所奏之誠速逹徑御至眞無極大道三清上聖昊天至尊金闕玉皇上帝御前出堂頌向來金籙祈夀午朝儀
